name: srag
version: "1.0.0"
profile: srag

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
test-paths: ["tests"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

# Medallion com uma pasta por camada (editável isoladamente):
#   bronze (source, via EL Python)  →  silver (limpeza+dedup+flags)  →  gold (star schema)
models:
  srag:
    silver:
      +schema: silver
      +materialized: table
    gold:
      +schema: gold
      +materialized: table
      +persist_docs: { relation: true, columns: true }

seeds:
  srag:
    +schema: gold
