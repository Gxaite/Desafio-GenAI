version: 2

models:
  - name: stg_srag__casos
    description: >
      Casos de SRAG tipados e renomeados 1:1 da camada bronze (silver/staging). Apenas
      registros com data de sintoma e notificação presentes.
    columns:
      - name: nu_notificacao
        description: Número da notificação (identificador do registro na origem).
        data_tests: [not_null]
      - name: dt_sintomas
        description: Data dos primeiros sintomas (date).
        data_tests: [not_null]
      - name: uf
        description: UF de residência (sigla; 'NA' quando ausente).
        data_tests: [not_null]
      - name: evolucao
        description: "Desfecho: 1=cura, 2=óbito, 3=óbito outras causas, 9=ignorado."
      - name: uti
        description: "Internação em UTI: 1=sim, 2=não, 9=ignorado."
      - name: vacina_covid
        description: "Vacinado COVID: 1=sim, 2=não, 9=ignorado."
