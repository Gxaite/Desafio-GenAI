version: 2

models:
  - name: silver_srag_casos
    description: Casos de SRAG limpos, tipados e deduplicados (1 linha por notificação).
    columns:
      - name: nu_notific
        description: Número da notificação — chave do caso.
        tests:
          - not_null
          - unique
      - name: dt_sintomas
        description: Data dos primeiros sintomas (date).
        tests:
          - not_null
      - name: uf
        description: UF de residência ('NA' quando ausente).
        tests:
          - not_null
      - name: evolucao
        description: "Desfecho: 1=cura, 2=óbito, 3=óbito outras causas, 9=ignorado."
        tests:
          - accepted_values:
              arguments:
                values: ["1", "2", "3", "9"]
              config:
                severity: warn
      - name: uti
        description: "Internação em UTI: 1=sim, 2=não, 9=ignorado."
        tests:
          - accepted_values:
              arguments:
                values: ["1", "2", "9"]
              config:
                severity: warn
      - name: vacina_cov
        description: "Vacinado COVID: 1=sim, 2=não, 9=ignorado."
        tests:
          - accepted_values:
              arguments:
                values: ["1", "2", "9"]
              config:
                severity: warn
