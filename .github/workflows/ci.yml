name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Instalar dependências
        run: |
          uv venv --python 3.12
          uv pip install ".[dev]"
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
      - name: Lint (ruff)
        run: ruff check .
      - name: Tipos (mypy)
        run: mypy src
      - name: Fronteiras da arquitetura (import-linter)
        run: lint-imports
      - name: Segurança (bandit)
        run: bandit -r src -q
      - name: Testes + cobertura (pytest, meta 85%)
        run: pytest

  dados:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dados/dbt
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Lint SQL (sqlfluff)
        run: uvx sqlfluff lint models tests
