name: desafio-genai

services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Job de ETL — roda sob demanda (profile "etl"), carrega os marts no Postgres.
  dados:
    build: ./dados
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/raw:/data/raw:ro
      - ./data/interim:/data/interim
    profiles: ["etl"]

  # API + agente (núcleo hexagonal).
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "${BACKEND_PORT}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request as u,sys; sys.exit(0 if u.urlopen('http://localhost:8000/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dashboards (bônus) — lê o Postgres, provisionado como código.
  grafana:
    image: grafana/grafana:11.1.0
    env_file: .env
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana

  # ── Qualidade de código (profile "quality"; sobe sob demanda, não no `up` normal) ──
  sonar-db:
    image: postgres:16-alpine
    profiles: ["quality"]
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonar-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 5s
      timeout: 5s
      retries: 10

  sonarqube:
    image: sonarqube:lts-community
    profiles: ["quality"]
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
    ports:
      - "9000:9000"
    depends_on:
      sonar-db:
        condition: service_healthy
    volumes:
      - sonarqube-data:/opt/sonarqube/data
      - sonarqube-extensions:/opt/sonarqube/extensions
      - sonarqube-logs:/opt/sonarqube/logs

  # Scanner one-shot: analisa o backend e envia ao SonarQube. Requer SONAR_TOKEN no .env.
  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    profiles: ["quality"]
    environment:
      SONAR_HOST_URL: http://sonarqube:9000
      SONAR_TOKEN: ${SONAR_TOKEN:-}
    volumes:
      - ./backend:/usr/src
    depends_on:
      - sonarqube

volumes:
  pgdata:
  grafana-data:
  sonar-db-data:
  sonarqube-data:
  sonarqube-extensions:
  sonarqube-logs:
